<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Manuscript</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    background:#f4efe6;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
}

/* paper grain */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/paper-fibers.png');
    opacity:0.35;
    z-index:0;
}

.container{
    text-align:center;
    z-index:1;
    animation:fadeIn 2s ease forwards;
}

.masthead{
    font-family:'Playfair Display', serif;
    font-size:64px;
    letter-spacing:3px;
    color:#2c1f14;
    margin-bottom:10px;
}

.sub{
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#6a5847;
    margin-bottom:30px;
}

.line{
    width:200px;
    height:1px;
    background:#2c1f14;
    margin:20px auto;
}

.tagline{
    font-size:20px;
    font-style:italic;
    color:#3a2c21;
    margin-bottom:40px;
}

.enter-btn{
    border:1px solid #2c1f14;
    padding:12px 28px;
    text-decoration:none;
    color:#2c1f14;
    font-size:14px;
    letter-spacing:2px;
    transition:all .3s ease;
}

.enter-btn:hover{
    background:#2c1f14;
    color:#f4efe6;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* fade out on click */
.fade-out{
    animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
    to{opacity:0;}
}
</style>
</head>

<body>

<div class="container" id="splash">
    <div class="masthead">THE MANUSCRIPT</div>
    <div class="sub">Est. 1924 • Independent Press</div>

    <div class="line"></div>

    <div class="tagline">Truth Inked in Every Line</div>

    <a href="HOME-NEWS.html" class="enter-btn" onclick="fadeOut(event)">ENTER</a>
</div>

<script>
function fadeOut(e){
    e.preventDefault();
    const splash = document.getElementById('splash');
    splash.classList.add('fade-out');

    setTimeout(()=>{
        window.location.href = 'HOME-NEWS.html';
    }, 800);
}
</script>

</body>
</html>
